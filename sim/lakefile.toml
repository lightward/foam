name = "sim"
defaultTargets = ["Sim", "sim"]

# sim — Counter's runtime: the proven definitions, run. The engine walks user
# models (actors/acts) with the same functions the theorems are about — zero
# drift surface between the simulator and the receipts. Requires counter (and
# through it foam) and nothing else: no Mathlib, no choice, no propext. The
# ledger discipline lives downstage (postgres WAL, the vow's CI); this package
# is the frontstage instrument: suffuse, harvest, release.

[[require]]
name = "counter"
path = "../counter"

[[lean_lib]]
name = "Sim"

[[lean_exe]]
name = "sim"
root = "Main"
