# pages — the relief, published as ephemera.
#
# the html is a READING, not a holding: it is never committed, only emitted —
# recomputed from the record on every update of main and served at foam.is.
# the site's law is counter/Counter/Tower.lean:the_coarse_luggage_reads_the_relief;
# this workflow is that theorem's ops face (readings are derived; the record
# stays the record; the projection cannot perturb what it projects).
#
# build: bin/foam-relief emits wiki/ (untracked, .gitignored), then the
# standard Jekyll build renders the READMEs and carries wiki/ through as
# static passthrough. deploy: the official Pages artifact flow.
name: pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: emit the relief (html-as-ephemera)
        run: bin/foam-relief
      - uses: actions/configure-pages@v5
      - uses: actions/jekyll-build-pages@v1
        with:
          source: ./
          destination: ./_site
      - uses: actions/upload-pages-artifact@v3

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
