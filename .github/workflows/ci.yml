name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  lean:
    name: Lean (zero sorry)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: leanprover/lean-action@v1
        with:
          build-args: ""
          lake-package-directory: lean
      - name: Build each Lean file individually (surfaces hidden type errors)
        working-directory: lean
        run: |
          for f in Foam/*.lean; do
            mod="Foam.$(basename "$f" .lean)"
            echo "Building $mod..."
            lake build "$mod" || exit 1
          done
      - name: No warnings (sorry excluded)
        working-directory: lean
        run: |
          warns=0
          for f in Foam/*.lean; do
            mod="Foam.$(basename "$f" .lean)"
            touch "$f"
            # Collect warnings that aren't sorry declarations
            non_sorry=$(lake build "$mod" 2>&1 | grep "warning:" | grep -v "declaration uses .sorry." || true)
            if [ -n "$non_sorry" ]; then
              echo "$non_sorry"
              warns=$((warns + 1))
            fi
          done
          if [ $warns -gt 0 ]; then
            echo ""
            echo "Non-sorry warnings found. Fix before merging."
            exit 1
          fi
          echo "Clean: only sorry warnings (expected)"

  integrity:
    name: Reference integrity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Every Lean file referenced in lean/README.md
        run: |
          errors=0
          for f in lean/Foam/*.lean; do
            [ -f "$f" ] || continue
            base=$(basename "$f")
            if ! grep -q "$base" lean/README.md; then
              echo "UNREFERENCED: $base (not in lean/README.md)"
              errors=$((errors + 1))
            fi
          done
          if [ $errors -gt 0 ]; then
            echo ""
            echo "$errors lean file(s) not referenced in lean/README.md"
            exit 1
          fi
          echo "All lean files referenced"
