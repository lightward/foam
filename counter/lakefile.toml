name = "counter"
defaultTargets = ["Counter"]

# Counter — foam run as an actor model, in a SEPARATE package that stays axiom-free.
# Where bridges/ requires Mathlib and lets classical axioms enter (sealed by the package
# boundary), counter/ requires ONLY foam: no Mathlib, no choice, no propext. Counter is
# the application of the physics, not a reunion with the classical corpus, so it inherits
# the core's discipline — every claim here seals `does not depend on any axioms`. Actors,
# acts, actions; self-supply the base loop; health is settling. The why is the Lean.

[[require]]
name = "foam"
path = ".."

[[lean_lib]]
name = "Counter"
