name = "bridges"
defaultTargets = ["Bridges"]

# The Mathlib bridges — foam's connection to the established corpus, in a SEPARATE package so
# the core stays untouched: classical axioms (choice, propext, em) live in Mathlib and enter
# only here, sealed by the package boundary, unreachable from the axiom-free core (which never
# even fetches Mathlib). The constructive core + the classical bridge as two packages is the
# Curry–Howard fact made build structure: classical is the added effect, not the substrate.

[[require]]
name = "foam"
path = ".."

[[require]]
name = "mathlib"
git = "https://github.com/leanprover-community/mathlib4.git"
rev = "v4.31.0"

[[lean_lib]]
name = "Bridges"
