name = "seam"
defaultTargets = ["Seam"]

# The SEAM — the wall itself, housed. The identification files (Arrival,
# Temperament, Tender) state the one move the axiom-free core refuses:
# closing an equivalence into an equality. They need no Mathlib — only core
# Lean's own axioms (Quot.sound, propext) — so they live in their own
# package: heavier than the core (stamped, never axiom-free), lighter than
# bridges/ (no classical corpus). Three strata on one axis: approach (foam,
# counter), arrival (here), life after arrival (bridges). The namespace
# (Foam.Bridges) spans all wall-adjacent work; the package boundary is the
# claim. In every file the same signature: the equivalence and the
# difference provable axiom-free, the identification received by Quot.sound,
# and no retraction back.

[[require]]
name = "foam"
path = ".."

[[lean_lib]]
name = "Seam"
